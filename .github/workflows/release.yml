name: Build Test APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-debug:
    name: Android Test APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Create temporary test signing config
        shell: bash
        run: |
          cat > android/keystore.properties <<'EOF'
          storeFile=debug.keystore
          storePassword=android
          keyAlias=androiddebugkey
          keyPassword=android
          EOF

      - name: Build standalone mobile and car APKs
        shell: bash
        run: |
          cd android
          ./gradlew assembleMobileRelease assembleCarRelease

      - name: Upload standalone mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: lx-music-mobile-test-${{ github.sha }}
          path: android/app/build/outputs/apk/mobile/release/*.apk
          if-no-files-found: error

      - name: Upload standalone car APK
        uses: actions/upload-artifact@v4
        with:
          name: lx-music-car-test-${{ github.sha }}
          path: android/app/build/outputs/apk/car/release/*.apk
          if-no-files-found: error

      - name: Publish test pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="test-v${VERSION}-${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "LX Music 测试版 v${VERSION} (${GITHUB_RUN_NUMBER})" \
            --notes "自动构建的测试签名 APK，内置 JavaScript bundle。请勿将其视为正式签名发布版。" \
            android/app/build/outputs/apk/mobile/release/*.apk \
            android/app/build/outputs/apk/car/release/*.apk

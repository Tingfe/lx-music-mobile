name: Build Test APK

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-debug:
    name: Android Test APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Create temporary test signing config
        shell: bash
        run: |
          cat > android/keystore.properties <<'EOF'
          storeFile=debug.keystore
          storePassword=android
          keyAlias=androiddebugkey
          keyPassword=android
          EOF

      - name: Build standalone mobile APK
        shell: bash
        run: |
          cd android
          ./gradlew assembleMobileRelease

      - name: Upload standalone mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: lx-music-mobile-test-${{ github.sha }}
          path: android/app/build/outputs/apk/mobile/release/*universal.apk
          if-no-files-found: error

      - name: Publish test pre-release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="test-v${VERSION}-${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "LX Music 测试版 v${VERSION} (${GITHUB_RUN_NUMBER})" \
            --notes "自动构建的测试签名 APK，内置 JavaScript bundle。请勿将其视为正式签名发布版。" \
            android/app/build/outputs/apk/mobile/release/*universal.apk

      - name: Publish stable release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          test "$GITHUB_REF_NAME" = "v$VERSION"
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "LX Music v${VERSION}" \
            --generate-notes \
            android/app/build/outputs/apk/mobile/release/*universal.apk

      - name: Check out update manifest
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@v4
        with:
          ref: release-info
          path: release-info

      - name: Update public update manifest
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          node scripts/update-release-manifest.js release-info/mobile.json
          git -C release-info config user.name github-actions[bot]
          git -C release-info config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git -C release-info add mobile.json
          git -C release-info diff --cached --quiet || git -C release-info commit -m "build: update mobile release manifest"
          git -C release-info push origin HEAD:release-info
